site_name: TaskBridge
site_description: Reliable AI Task Streaming library for Android and FastAPI.
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - backend/taskbridge-fastapi
            - backend/adapters/temporal
          options:
            show_root_heading: true
            show_source: false
            heading_level: 2

nav:
  - General:
      - Overview: index.md
      - Getting Started: getting-started.md
      - Examples: examples/index.md
  
  - Android SDK:
      - Overview: android/index.md
      - Production Setup: android/production-setup.md
      - Client and Config: android/client-config.md
      - Events and Recovery: android/events-and-recovery.md
      - Transport and Extension Points: android/transport-and-extension-points.md
      - Storage and Policies: android/storage-and-policies.md
      - API Reference: reference/android.md
  
  - Backend (FastAPI):
      - Overview: backend/index.md
      - Advanced Routing: backend/advanced-routing.md
      - Host Integration: backend/host-integration.md
      - Services and Routes: backend/services-and-routes.md
      - Security, Readiness, and Observability: backend/security-readiness-observability.md
      - State and Runtime Boundaries: backend/state-and-runtime-boundaries.md
      - Adapters:
          - Overview: adapters/index.md
          - Temporal Adapter: adapters/temporal.md
      - Python API: reference/backend.md
      - Adapter Reference: reference/adapters.md
  
  - Protocol:
      - Specification: protocol/index.md
      - OpenAPI Reference: reference/backend-api/index.html
  
  - Project:
      - Architecture:
          - Overview: architecture/index.md
          - Executor Integration: executor-integration.md
          - Security Integration: security-integration.md
          - Observability and Ops: observability-ops.md
      - ADR:
          - Overview: adr/index.md
          - 0001 Backend Stack: adr/0001-backend-stack.md
          - 0002 Android Networking: adr/0002-android-networking.md
          - 0003 Streaming Protocol: adr/0003-streaming-protocol.md
          - 0004 Backend Library Shape: adr/0004-backend-library-shape.md
          - 0005 Android Toolchain and Build Quality: adr/0005-android-toolchain-build-quality.md
          - 0006 Backend Transport Boundary: adr/0006-backend-transport-runtime-boundary.md
      - Contributing:
          - Guide: contributing/index.md
          - Publication: contributing/publication.md
      - Documentation Workflow: documentation/index.md

repo_name: task-bridge
edit_uri: ""
