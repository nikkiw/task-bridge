name: temporal-adapter-ci

on:
  pull_request:
    paths:
      - "backend/adapters/temporal/**"
      - ".github/workflows/temporal-adapter-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/adapters/temporal/**"
      - ".github/workflows/temporal-adapter-ci.yml"

jobs:
  temporal-adapter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/adapters/temporal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Pytest
        run: uv run pytest
