name: publish-release

on:
  push:
    tags:
      - "android-v*"
      - "python-v*"
      - "python-*-v*"

permissions:
  contents: write

jobs:
  publish-android:
    if: startsWith(github.ref, 'refs/tags/android-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        working-directory: .
        run: |
          uv run python scripts/release_tools.py verify-changelog --tag "${GITHUB_REF_NAME}" > release-notes.md
          uv run python scripts/release_tools.py release-title --tag "${GITHUB_REF_NAME}" > release-title.txt

      - name: Verify changelog section exists for tag
        working-directory: .
        run: test -s release-notes.md

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Publish Android artifacts to Sonatype compatibility API
        run: |
          ./gradlew publishAllPublicationsToOSSRHRepository \
            -PVERSION_NAME=${GITHUB_REF_NAME#android-v} \
            -PossrhUsername=${{ secrets.OSSRH_USERNAME }} \
            -PossrhPassword=${{ secrets.OSSRH_PASSWORD }} \
            -PsigningKey="${{ secrets.SIGNING_KEY }}" \
            -PsigningPassword="${{ secrets.SIGNING_PASSWORD }}"

      - name: Transfer Android deployment to Central Portal
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          AUTH_TOKEN=$(printf '%s' "${OSSRH_USERNAME}:${OSSRH_PASSWORD}" | base64 | tr -d '\n')
          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer ${AUTH_TOKEN}" \
            --header "Accept: application/json" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.nikkiw?publishing_type=automatic"

      - name: Create or update GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE=$(cat release-title.txt)
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${TITLE}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${TITLE}" --notes-file release-notes.md
          fi

  publish-python:
    if: startsWith(github.ref, 'refs/tags/python-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Prepare release metadata
        run: |
          uv run python scripts/release_tools.py verify-changelog --tag "${GITHUB_REF_NAME}" > release-notes.md
          uv run python scripts/release_tools.py release-title --tag "${GITHUB_REF_NAME}" > release-title.txt

      - name: Verify changelog section exists for tag
        run: test -s release-notes.md

      - name: Determine Package Directory
        id: pkg
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^python-v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "dir=backend/taskbridge-fastapi" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" =~ ^python-([a-z0-9-]+)-v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            ADAPTER_NAME="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            echo "dir=backend/adapters/${ADAPTER_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported tag format: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Build and Publish to PyPI
        run: |
          VERSION=${{ steps.pkg.outputs.version }}
          if [[ "${GITHUB_REF_NAME}" =~ ^python-v ]]; then
            COMPONENT="backend-fastapi"
          elif [[ "${GITHUB_REF_NAME}" =~ ^python-temporal-v ]]; then
            COMPONENT="temporal-adapter"
          else
            echo "::error::Unsupported tag format: ${GITHUB_REF_NAME}"
            exit 1
          fi
          uv run python scripts/release_tools.py set-package-version --component "${COMPONENT}" --version "${VERSION}"
          cd "${{ steps.pkg.outputs.dir }}"
          uv build
          uv publish --token ${{ secrets.PYPI_API_TOKEN }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE=$(cat release-title.txt)
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${TITLE}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${TITLE}" --notes-file release-notes.md
          fi
